<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AAPAL-GHAR</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>

<body>

<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- LEFT PANEL (Desktop Only) -->
        <div class="col-lg-6 d-none d-lg-flex left-panel align-items-center justify-content-center text-center">
            <div>
                <h1>Join AAPAL-GHAR 🏠</h1>
                <p>Create your account and start exploring verified rental homes.</p>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="col-lg-6 col-12 d-flex align-items-center justify-content-center right-panel">
            <div class="form-box w-100">
                <h2 class="text-center mb-4">Create Account</h2>

                <form>
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Email Address" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Password" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Confirm Password" required>
                    </div>

                    <button type="submit" class="btn btn-warning w-100">Register</button>
                </form>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
