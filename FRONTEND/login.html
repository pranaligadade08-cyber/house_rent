<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AAPAL-GHAR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>

<body>

<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- LEFT PANEL -->
        <div class="col-lg-6 d-none d-lg-flex left-panel align-items-center justify-content-center text-center">
            <div>
                <h1>Welcome Back 🏡</h1>
                <p>Find your dream rental home in Kolhapur with AAPAL-GHAR.</p>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="col-lg-6 col-12 d-flex align-items-center justify-content-center right-panel">
            <div class="form-box w-100">
                <h2 class="text-center mb-4">Login</h2>

                <form>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Email Address" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Password" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">Login</button>
                </form>

                <p class="text-center mt-3">
                    Don't have an account?
                    <a href="register.html">Register</a>
                </p>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
